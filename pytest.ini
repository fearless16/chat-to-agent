[pytest]
minversion = 8.0
testpaths = ai_orchestrator/tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
log_cli = true
log_cli_level = INFO
addopts = -v --tb=short --strict-markers --cov=ai_orchestrator --cov-report=term-missing

markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (require Redis/Postgres)
    slow: Slow tests (mark to skip by default)
    browser: Browser automation tests
    security: Security-related tests
